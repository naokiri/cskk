language: rust
sudo: false
matrix:
  fast_finish: true
  allow_failures:
  - rust: nightly
  include:
  - name: "Stable"
    rust: stable
    env: EXTRA_LINT_CHECK=1
  - name: "Beta"
    rust: beta
    env: EXTRA_LINT_CHECK=0
  - name: "Nightly"
    rust: nightly
    env: EXTRA_LINT_CHECK=0
cache: cargo
addons:
  apt:
    packages:
    - libxkbcommon-dev
before_script:
- rustup component add clippy-preview
script:
- cargo build --verbose --all
- if [ $EXTRA_LINT_CHECK -gt 0 ]; 
  then cargo clippy -- -D warnings -A dead_code; 
  else cargo clippy;
  fi
- cargo test --verbose --all
after_script: |
  wget https://github.com/SimonKagstrom/kcov/archive/master.tar.gz &&
  tar xzf master.tar.gz &&
  cd kcov-master &&
  mkdir build &&
  cd build &&
  cmake .. &&
  make &&
  make install DESTDIR=../../kcov-build &&
  cd ../.. &&
  rm -rf kcov-master &&
  for file in target/debug/examplerust-*[^\.d]; do mkdir -p "target/cov/$(basename $file)"; ./kcov-build/usr/local/bin/kcov --exclude-pattern=/.cargo,/usr/lib --verify "target/cov/$(basename $file)" "$file"; done &&
  bash <(curl -s https://codecov.io/bash) &&
  echo "Uploaded code coverage"
